services:
    laravel:
      build:
        context: .
        dockerfile: docker/Dockerfile
        target: production
      restart: unless-stopped
      env_file: .env
      environment:
        AUTORUN_ENABLED: "true"
        PHP_OPCACHE_ENABLE: 1
        PHP_UPLOAD_MAX_FILE_SIZE: 500M
      volumes:
        - storage:/var/www/html/storage
      depends_on:
        mysql:
          condition: service_healthy
        redis:
          condition: service_started
      networks:
        - laravel

    queue:
      build:
        context: .
        dockerfile: docker/Dockerfile
        target: production
      command: ["php", "/var/www/html/artisan", "queue:work", "--tries=3", "--max-time=3600"]
      restart: unless-stopped
      env_file: .env
      healthcheck:
        disable: true
      volumes:
        - storage:/var/www/html/storage
      depends_on:
        mysql:
          condition: service_healthy
        redis:
          condition: service_started
      networks:
        - laravel

    scheduler:
      build:
        context: .
        dockerfile: docker/Dockerfile
        target: production
      command: ["php", "/var/www/html/artisan", "schedule:work"]
      restart: unless-stopped
      env_file: .env
      healthcheck:
        disable: true
      volumes:
        - storage:/var/www/html/storage
      depends_on:
        mysql:
          condition: service_healthy
        redis:
          condition: service_started
      networks:
        - laravel

    mysql:
      image: mysql:9.0
      restart: unless-stopped
      environment:
        MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        MYSQL_DATABASE: ${DB_DATABASE}
        MYSQL_USER: ${DB_USERNAME}
        MYSQL_PASSWORD: ${DB_PASSWORD}
      volumes:
        - mysql-data:/var/lib/mysql
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME}", "-p${DB_PASSWORD}"]
        interval: 5s
        timeout: 5s
        retries: 20
      networks:
        - laravel

    redis:
      image: redis:7-alpine
      restart: unless-stopped
      volumes:
        - redis-data:/data
      networks:
        - laravel

volumes:
  storage:
  mysql-data:
  redis-data:

networks:
  laravel:
    driver: bridge
